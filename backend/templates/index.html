<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrCoach - Detector de Técnica</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { Application, Controller } from "https://unpkg.com/@hotwired/stimulus/dist/stimulus.js"
        window.Stimulus = Application.start()
    </script>

    <script type="module">
    import { Application } from "https://unpkg.com/@hotwired/stimulus/dist/stimulus.js"
    window.Stimulus = Application.start()

    // Registramos tu nuevo controlador de la webcam
    import WebcamController from "/static/webcam_controller.js"
    Stimulus.register("webcam", WebcamController)
</script>
</head>
<body class="bg-neutral-900 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <main class="max-w-4xl w-full text-center space-y-6">
        <h1 class="text-4xl font-extrabold tracking-tight text-emerald-400">
            UrCoach <span class="text-neutral-400 text-2xl font-light">| Analizador Bio-Mecánico</span>
        </h1>
        
        <p class="text-neutral-400 max-w-md mx-auto">
            Configuración inicial de la interfaz de cámara web mediante Hotwire Stimulus.
        </p>

        <div data-controller="webcam" class="bg-neutral-800 p-4 rounded-2xl border border-neutral-700 shadow-xl inline-block">

    <div class="relative w-[640px] h-[480px] bg-black rounded-lg overflow-hidden flex items-center justify-center">
        <span class="absolute text-neutral-500">Cámara apagada</span>

        <video data-webcam-target="video" autoplay playsinline class="w-full h-full object-cover scale-x-[-1]"></video>
    </div>

    <div class="mt-4 flex justify-center space-x-4">
        <button data-action="click->webcam#encender" class="bg-emerald-500 hover:bg-emerald-600 text-neutral-950 font-bold py-2 px-6 rounded-lg transition">
            Encender Cámara
        </button>

        <button data-action="click->webcam#apagar" class="bg-neutral-700 hover:bg-neutral-600 text-white font-bold py-2 px-6 rounded-lg transition">
            Apagar
        </button>
    </div>
</div>
    </main>

</body>
</html>
